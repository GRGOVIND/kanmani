<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Kanmani❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff758c,#ff7eb3,#ffd3a5);
overflow:hidden;
}

.hearts{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:0;
}

.hearts span{
position:absolute;
display:block;
font-size:25px;
animation:float 10s linear infinite;
opacity:.6;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(.5);
}
100%{
transform:translateY(-120vh) scale(1.5);
}
}

.container{
position:relative;
z-index:1;
background:white;
padding:40px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.2);
text-align:center;
width:90%;
max-width:600px;
}

h1{
color:#ff3366;
margin-bottom:15px;
font-size:2.4rem;
}

p{
font-size:20px;
margin-bottom:30px;
color:#444;
}

.buttons{
position:relative;
height:170px;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
transition:.2s;
position:absolute;
}

#yes{
background:#28a745;
color:white;
left:50%;
transform:translateX(-50%);
bottom:20px;
}

#no{
background:#ff4d4d;
color:white;
left:70px;
top:20px;
}

#maybe{
background:#ffc107;
color:black;
right:70px;
top:20px;
}

.result{
display:none;
margin-top:30px;
animation:pop .6s;
}

.result img{
width:260px;
border-radius:20px;
margin-top:20px;
box-shadow:0 10px 20px rgba(0,0,0,.2);
}

@keyframes pop{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="container">

<h1>❤️ My Love ❤️</h1>

<p>Will You Be My Wifey? 💍🥺</p>

<div class="buttons">
<button id="yes">YES ❤️</button>
<button id="no">NO 😒</button>
<button id="maybe">MAYBE 🤭</button>
</div>

<div class="result" id="result">
<h2>I knew you'd say YES! 🥹❤️</h2>
<p>You just made me the happiest person alive! 💖</p>

<!-- Replace this GIF with your own -->
<img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" alt="Love">
</div>

</div>

<script>

const no=document.getElementById("no");
const maybe=document.getElementById("maybe");
const yes=document.getElementById("yes");

function move(btn){

const maxX=window.innerWidth-150;
const maxY=window.innerHeight-80;

btn.style.left=Math.random()*maxX+"px";
btn.style.top=Math.random()*maxY+"px";
}

["mouseover","touchstart"].forEach(event=>{

no.addEventListener(event,()=>move(no));

maybe.addEventListener(event,()=>move(maybe));

});

yes.onclick=()=>{

document.querySelector(".buttons").style.display="none";

document.getElementById("result").style.display="block";

};

const hearts=document.getElementById("hearts");

for(let i=0;i<40;i++){

let heart=document.createElement("span");

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=5+Math.random()*8+"s";

heart.style.fontSize=(15+Math.random()*30)+"px";

heart.style.animationDelay=Math.random()*5+"s";

hearts.appendChild(heart);

}

</script>

</body>
</html>
